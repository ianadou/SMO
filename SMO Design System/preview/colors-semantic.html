<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .swatch {
    border-radius: var(--radius-md);
    padding: 16px;
    height: 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .name { font-family: var(--font-sans); font-weight: 500; font-size: 13px; }
  .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.9; }
  .role { font-family: var(--font-sans); font-size: 11px; opacity: 0.85; margin-top: 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch" style="background:#DC2A3B; color:#FFFFFF;">
      <div><div class="name">Rouge équipe</div><div class="role">Équipe A · erreur</div></div>
      <div class="hex">#DC2A3B</div>
    </div>
    <div class="swatch" style="background:#30D158; color:#0E1014;">
      <div><div class="name">Vert smaragdin</div><div class="role">Équipe B · succès</div></div>
      <div class="hex">#30D158</div>
    </div>
    <div class="swatch" style="background:#F5C518; color:#0E1014;">
      <div><div class="name">Jaune signal</div><div class="role">Avertissement</div></div>
      <div class="hex">#F5C518</div>
    </div>
  </div>
</body></html>
