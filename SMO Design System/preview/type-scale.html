<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bg-base); color: var(--fg-default); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; }
  .row + .row { border-top: 1px solid var(--border-default); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 140px; flex-shrink: 0; }
  .specimen { flex: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">28 / 1.2 · 600</div>
    <div class="specimen" style="font-size:28px; line-height:1.2; font-weight:600; letter-spacing:-0.01em;">Connexion organisateur</div>
  </div>
  <div class="row">
    <div class="meta">15 / 1.5 · 400</div>
    <div class="specimen" style="font-size:15px; line-height:1.5;">On reste sobres, comme Linear.</div>
  </div>
  <div class="row">
    <div class="meta">13 / 1.4 · 400 · muted</div>
    <div class="specimen" style="font-size:13px; line-height:1.4; color:var(--fg-muted);">Les joueurs n'ont pas besoin de compte — ils accèdent par lien d'invitation.</div>
  </div>
</body></html>
