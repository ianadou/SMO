<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); color: var(--fg-default); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 24px; }
  .field label { display:block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .input {
    width: 100%;
    height: 44px;
    background: var(--bg-elevated);
    border: 0;
    border-radius: var(--radius-md);
    color: var(--fg-default);
    padding: 0 14px;
    font-family: var(--font-sans);
    font-size: 16px;
    box-sizing: border-box;
    outline: none;
  }
  .input::placeholder { color: var(--fg-muted); }
  .input.focus { box-shadow: inset 0 0 0 2px var(--action-primary); }
  .input.error { box-shadow: inset 0 0 0 2px var(--danger); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="field">
      <label>Email</label>
      <input class="input" placeholder="toi@exemple.fr">
      <div class="meta">default · no border, fill on bg-elevated</div>
    </div>
    <div class="field">
      <label>Email</label>
      <input class="input focus" value="alex@gmail.com">
      <div class="meta">focus · 2px inset ring in --action-primary</div>
    </div>
    <div class="field">
      <label>Email</label>
      <input class="input" value="alex@gmail.com" style="color: var(--fg-default);">
      <div class="meta">filled · same as default with text</div>
    </div>
    <div class="field">
      <label>Email</label>
      <input class="input error" value="alex@gmail.com">
      <div class="meta">error · 2px inset ring in --danger</div>
    </div>
  </div>
</body></html>
