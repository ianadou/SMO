<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--bg-base); color: var(--fg-default); font-family: var(--font-sans);
         display: flex; align-items: center; justify-content: center; min-height: 200px; gap: 48px; }
  .wordmark { display: flex; align-items: baseline; }
  .wordmark .text {
    font-family: var(--font-sans);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--fg-default);
  }
  .wordmark .dot {
    display: inline-block;
    border-radius: 999px;
    background: var(--action-primary);
    margin-left: 4px;
  }
  .lg .text { font-size: 40px; }
  .lg .dot  { width: 6px; height: 6px; transform: translateY(-3px); }
  .md .text { font-size: 28px; }
  .md .dot  { width: 5px; height: 5px; transform: translateY(-2px); }
  .sm .text { font-size: 18px; }
  .sm .dot  { width: 4px; height: 4px; transform: translateY(-1px); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 8px; text-align:center; }
</style>
</head>
<body>
  <div>
    <div class="wordmark lg"><span class="text">SMO</span><span class="dot"></span></div>
    <div class="meta">40px · login</div>
  </div>
  <div>
    <div class="wordmark md"><span class="text">SMO</span><span class="dot"></span></div>
    <div class="meta">28px · header</div>
  </div>
  <div>
    <div class="wordmark sm"><span class="text">SMO</span><span class="dot"></span></div>
    <div class="meta">18px · favicon row</div>
  </div>
</body></html>
