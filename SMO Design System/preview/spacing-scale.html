<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); color: var(--fg-default); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 16px; padding: 6px 0; }
  .bar { background: var(--action-primary); height: 16px; border-radius: 2px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 80px; }
  .px   { font-family: var(--font-mono); font-size: 11px; color: var(--fg-default); }
</style>
</head>
<body>
  <div class="row"><div class="meta">space-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="meta">space-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="meta">space-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="meta">space-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="meta">space-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="meta">space-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="meta">space-10</div><div class="bar" style="width:40px"></div><div class="px">40 px</div></div>
  <div class="row"><div class="meta">space-14</div><div class="bar" style="width:56px"></div><div class="px">56 px</div></div>
</body></html>
