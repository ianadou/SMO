<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bg-base); color: var(--fg-default); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box  { width: 64px; height: 64px; background: var(--bg-elevated); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .val  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-default); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><div class="box" style="border-radius:6px"></div><div class="name">--radius-sm</div><div class="val">6 px</div></div>
    <div class="tile"><div class="box" style="border-radius:10px"></div><div class="name">--radius-md</div><div class="val">10 px</div></div>
    <div class="tile"><div class="box" style="border-radius:14px"></div><div class="name">--radius-lg</div><div class="val">14 px</div></div>
    <div class="tile"><div class="box" style="border-radius:999px"></div><div class="name">--radius-pill</div><div class="val">999 px</div></div>
  </div>
</body></html>
