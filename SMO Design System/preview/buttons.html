<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bg-base); color: var(--fg-default); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; align-items: center; }
  .btn {
    width: 100%;
    height: 44px;
    border-radius: var(--radius-md);
    border: 0;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 15px;
    color: var(--fg-emphasis);
    background: var(--action-primary);
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-hover { background: var(--action-primary-hover); }
  .btn-disabled { background: var(--action-primary); opacity: 0.55; cursor: not-allowed; }
  .btn-focus { background: var(--action-primary); box-shadow: 0 0 0 2px var(--bg-base), 0 0 0 4px rgba(32,128,255,0.55); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-top: 6px; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 999px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <button class="btn">Se connecter</button>
      <div class="meta">default · #2080FF</div>
    </div>
    <div>
      <button class="btn btn-hover">Se connecter</button>
      <div class="meta">hover · #1452C9</div>
    </div>
    <div>
      <button class="btn btn-focus">Se connecter</button>
      <div class="meta">focus-visible · 2px ring</div>
    </div>
    <div>
      <button class="btn btn-disabled"><span class="spinner"></span>Connexion…</button>
      <div class="meta">loading · disabled · spinner</div>
    </div>
  </div>
</body></html>
