<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: #2080FF; border-radius: 2px; width: 28px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .name { font-size: 11px; color: var(--fg-default); font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="name">1</div><div class="label">4px</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="name">2</div><div class="label">8px</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="name">3</div><div class="label">12px</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="name">4</div><div class="label">16px</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="name">5</div><div class="label">20px</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="name">6</div><div class="label">24px</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="name">8</div><div class="label">32px</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="name">10</div><div class="label">40px</div></div>
    <div class="item"><div class="bar" style="height:56px"></div><div class="name">14</div><div class="label">56px</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="name">20</div><div class="label">80px</div></div>
  </div>
</body>
</html>
