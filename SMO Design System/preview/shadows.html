<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 40px; background: var(--bg-base); color: var(--fg-default); font-family: var(--font-sans); }
  .row { display: flex; gap: 32px; align-items: flex-start; }
  .tile { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .box  { width: 96px; height: 64px; background: var(--bg-elevated); border-radius: 10px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .focus { box-shadow: 0 0 0 2px rgba(32,128,255,0.45); }
  .elev  { box-shadow: 0 8px 24px -8px rgba(0,0,0,0.6); }
  .desc { font-size: 11px; color: var(--fg-muted); max-width: 200px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile">
      <div class="box"></div>
      <div class="name">none (default)</div>
      <div class="desc">Cards &amp; forms have no shadow on dark — depth comes from the surface fill.</div>
    </div>
    <div class="tile">
      <div class="box focus"></div>
      <div class="name">--shadow-focus</div>
      <div class="desc">2px ring at 45% blue. Inputs and buttons on :focus-visible only.</div>
    </div>
    <div class="tile">
      <div class="box elev"></div>
      <div class="name">--shadow-elevated</div>
      <div class="desc">Reserved for popovers and modals. Never on inline cards.</div>
    </div>
  </div>
</body></html>
