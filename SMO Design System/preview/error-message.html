<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); color: var(--fg-default); font-family: var(--font-sans); }
  .alert {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px;
    background: rgba(220, 42, 59, 0.10);
    border-radius: var(--radius-md);
    color: #FF8B97;
    font-size: 14px;
    line-height: 1.4;
  }
  .alert svg { flex-shrink: 0; margin-top: 1px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-top: 8px; }
  .stack { display: flex; flex-direction: column; gap: 8px; max-width: 420px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Identifiants incorrects.</span>
    </div>
    <div class="meta">inline error · sits below the form, never as toast · uses --danger at 10% fill, --danger lightened for text</div>
  </div>
</body></html>
