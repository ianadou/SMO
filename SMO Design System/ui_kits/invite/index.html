<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SMO — Invitation joueur</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="invite.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../login/Wordmark.jsx"></script>
  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="InvitePage.jsx"></script>

  <script type="text/babel">
    const GalleryCard = ({ name, sub, children }) => (
      <div className="gallery-card" data-screen-label={name}>
        <div className="inv-frame"><div className="inv-frame-scroll">{children}</div></div>
        <div className="gallery-card-meta">
          <div className="gallery-card-name">{name}</div>
          <div className="gallery-card-sub">{sub}</div>
        </div>
      </div>
    );

    const App = () => (
      <>
        <main data-screen-label="01 Invite — Live (Vue A interactive)">
          <InvScreen initialView="A" />
        </main>

        <section className="gallery" data-screen-label="02 Vues empilées">
          <header className="gallery-header">
            <div className="gallery-eyebrow">Invitation joueur · 4 états</div>
            <div className="gallery-title">Lien WhatsApp/SMS — toutes les vues</div>
          </header>
          <div className="gallery-grid">
            <GalleryCard name="Vue A — Invitation initiale" sub="avant réponse · CTA Répondre">
              <InvScreen initialView="A" frozen />
            </GalleryCard>
            <GalleryCard name="Vue B — Modal de réponse" sub="overlay · 2 boutons grande taille">
              <InvScreen initialView="B" frozen />
            </GalleryCard>
            <GalleryCard name="Vue C — Réponse Oui" sub="check vert · modifiable (Open)">
              <InvScreen initialView="C" initialAnswer="yes" frozen />
            </GalleryCard>
            <GalleryCard name="Vue C — Réponse Non" sub="x rouge · modifiable (Open)">
              <InvScreen initialView="C" initialAnswer="no" frozen />
            </GalleryCard>
          </div>
        </section>
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
