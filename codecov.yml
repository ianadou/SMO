# Codecov configuration for SMO.
# Reference: https://docs.codecov.com/docs/codecovyml-reference
#
# Aligns Codecov's measurement and presentation with the CI gate
# (.github/workflows/ci.yml step "Enforce minimum coverage threshold",
# currently 80%) so the two numbers stay coherent.

coverage:
  # Badge color uses Codecov's default range (red <70, yellow 70-90,
  # green >=90). Not narrowed: the visible color must reflect real
  # coverage, not be tuned to the CI gate just to look green.
  precision: 1
  round: down

  status:
    project:
      default:
        # Project-wide gate. Set to the honest measured number — see
        # the matching CI threshold in .github/workflows/ci.yml.
        target: auto
        threshold: 0.5%
    patch:
      default:
        # New code in a PR must itself be covered. 80% target keeps
        # the bar high without blocking a one-line refactor.
        target: 80%
        threshold: 1%

# Exclude only paths with no coverable code OR the composition root
# while it has no smoke test yet:
#   - sentinel error declarations (no functions)
#   - port interface declarations (no statements)
#   - sqlc-generated code (not our code)
#   - cmd/server: composition root; the smoke test that covers
#     buildRouter lives in the follow-up honest-coverage-server PR,
#     and this exclusion is removed there.
#
# Everything else (cmd/healthcheck, trivial adapters, in-memory repo)
# is now in scope. If a path has poor coverage, the answer is to
# test it, not to hide it.
ignore:
  - "cmd/server/**"
  - "**/generated/**"
  - "domain/errors/**"
  - "domain/ports/**"

comment:
  # Compact PR comment focused on the diff. No tree, no project totals
  # repeated each comment — those live in the dashboard.
  layout: "header, diff, files, footer"
  require_changes: true
  behavior: default

# GitHub PR check status mirrors the project gate; rendered next to
# the existing CI checks.
github_checks:
  annotations: true
