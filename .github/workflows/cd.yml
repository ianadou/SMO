# Continuous deployment workflow for SMO.
#
# On every push to main, builds a multi-arch (amd64 + arm64) image and
# publishes it to GHCR with two tags:
#   - <short-sha> for traceability per commit
#   - latest as a moving pointer to the tip of main
#
# GitHub Actions cache (type=gha) is wired on the build step so
# incremental pushes reuse module-download and build layers across
# runs. Vulnerability scanning runs on the CI side (Trivy fs+image,
# blocking on CRITICAL/HIGH); image signing is not yet in this
# pipeline and lands in a dedicated follow-up PR.
name: CD
on:
  push:
    branches:
      - main
    # Skip CD when a merge to main only touches paths that cannot
    # affect the produced image (docs, ADRs, test files not embedded
    # in the binary, CI workflow definitions, dependency manifests
    # for tooling like Renovate). The cd.yml itself is intentionally
    # NOT excluded: a change to it must re-run the CD to validate.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*_test.go'
      - 'renovate.json'
      - '.github/workflows/ci.yml'
      - '.gitignore'
      - '.dockerignore'
      - '.pre-commit-config.yaml'
      - '.golangci.yml'
      - 'LICENSE'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: read
  packages: write
jobs:
  publish:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/ianadou/smo-app
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest
      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache. mode=max keeps intermediate layers
          # (not just the final image), which is what makes the
          # multi-stage Go build benefit from cache hits on go mod
          # download and incremental builds. The 10 GB per-repo
          # cap is enforced by GHA with LRU eviction.
          cache-from: type=gha
          cache-to: type=gha,mode=max
