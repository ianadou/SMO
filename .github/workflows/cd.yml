# Continuous deployment workflow for SMO.
#
# On every push to main, builds a multi-arch (amd64 + arm64) image and
# publishes it to GHCR with two tags:
#   - <short-sha> for traceability per commit
#   - latest as a moving pointer to the tip of main
#
# This minimal pipeline does not yet include vulnerability scanning, build
# cache, or image signing — those land in dedicated follow-up PRs.
name: CD
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: read
  packages: write
jobs:
  publish:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ianadou/smo-app
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
