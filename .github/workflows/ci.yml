# Continuous integration workflow for SMO.
#
# Runs on every push and pull request:
#   - lint: golangci-lint with our strict v2 config
#   - build: compiles the server binary to catch build errors
#   - tidy: ensures go.mod and go.sum are clean and minimal
#   - test: runs the test suite (unit + integration) with race detection
#           and coverage gate
#
# All jobs run in parallel for fast feedback.
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Run hadolint on Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3059 (consecutive RUN instructions) is intentionally
          # ignored: the two go build steps are kept separate to give
          # buildx distinct cache layers (server vs healthcheck).
          ignore: DL3059
  security:
    name: Trivy security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Scan filesystem (Go modules + lockfiles)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          # Blocking. Baseline was clean when this was flipped from
          # non-blocking; new CRITICAL/HIGH findings now break the PR.
          # Renovate keeps base images and Go modules patched, so the
          # gate should rarely surprise us in normal operation.
          exit-code: '1'
      - name: Upload filesystem SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: smo-app:trivy-scan
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: smo-app:trivy-scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Upload image SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build server binary
        run: go build -v ./cmd/server
      - name: Build all packages
        run: go build -v ./...
  tidy:
    name: Mod tidy check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify go.mod and go.sum are tidy
        run: |
          GOFLAGS="-tags=integration" go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'GOFLAGS=-tags=integration go mod tidy' locally and commit the changes."
            exit 1
          fi
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests with race detector and coverage
        # Coverage scope: every package EXCEPT paths with no coverable
        # code OR untestable composition-root paths:
        #   - domain/errors  → sentinel error declarations only, zero functions
        #   - domain/ports   → interface declarations only, zero statements
        #   - .../generated  → sqlc-generated code, not ours to cover
        #   - cmd/server     → composition root; tests + smoke arrive in
        #                      a follow-up PR (honest-coverage-server),
        #                      where this exclusion will be removed.
        #
        # Everything else (cmd/healthcheck, trivial adapters like clock
        # and idgen, the in-memory repo) is now in scope. If a path has
        # poor coverage, the answer is to test it — never to hide it
        # from the denominator.
        #
        # The -tags=integration flag includes the testcontainers-based
        # integration tests. Docker must be available on the runner;
        # ubuntu-latest provides it by default.
        run: |
          coverpkg=$(go list ./... \
            | grep -v '/cmd/server' \
            | grep -v '/domain/errors' \
            | grep -v '/domain/ports' \
            | grep -v '/generated' \
            | paste -sd ',' -)
          echo "Coverage measured on: $coverpkg"
          go test -tags=integration -race -coverprofile=coverage.out -covermode=atomic -coverpkg="$coverpkg" ./...
      - name: Enforce minimum coverage threshold
        # The threshold tracks REAL coverage, never an aspirational
        # target. Raise it only after writing more tests; never lower
        # it to make a regression pass.
        run: |
          threshold=80.0
          coverage=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${coverage}%"
          echo "Minimum required: ${threshold}%"
          awk -v cov="$coverage" -v min="$threshold" 'BEGIN { if (cov + 0 < min + 0) { exit 1 } }' || {
            echo "::error::Coverage ${coverage}% is below the required ${threshold}% threshold."
            exit 1
          }
      # Upload coverage to Codecov for the PR delta comment and the
      # public README badge. Tokenless mode works on public repos —
      # see https://docs.codecov.com/docs/codecov-tokens. Failing the
      # upload must NOT fail the CI (Codecov outage is not our problem).
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
