# Continuous integration workflow for SMO.
#
# Runs on every push and pull request:
#   - lint: golangci-lint with our strict v2 config
#   - build: compiles the server binary to catch build errors
#   - tidy: ensures go.mod and go.sum are clean and minimal
#   - test: runs the test suite (unit + integration) with race detection
#           and coverage gate
#
# All jobs run in parallel for fast feedback.
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build server binary
        run: go build -v ./cmd/server
      - name: Build all packages
        run: go build -v ./...
  tidy:
    name: Mod tidy check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify go.mod and go.sum are tidy
        run: |
          GOFLAGS="-tags=integration" go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'GOFLAGS=-tags=integration go mod tidy' locally and commit the changes."
            exit 1
          fi
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests with race detector and coverage
        # Coverage is measured only on packages that are meant to be tested.
        # Excluded:
        #   - cmd/...                  → main, tested via integration smoke
        #   - domain/errors            → only sentinel errors, no logic
        #   - domain/ports             → interface declarations only
        #   - .../generated            → sqlc-generated code
        #   - infrastructure/clock     → trivial wrapper around time.Now()
        #   - infrastructure/idgen     → trivial wrapper around uuid.NewString()
        #   - .../inmemory             → temporary repo for local dev
        #
        # The -tags=integration flag includes the testcontainers-based
        # integration tests for the Postgres repository. These tests spin
        # up a real Postgres container per test package, so they require
        # Docker to be available on the runner (ubuntu-latest provides it).
        run: |
          coverpkg=$(go list ./... \
            | grep -v '/cmd/' \
            | grep -v '/domain/errors' \
            | grep -v '/domain/ports' \
            | grep -v '/generated' \
            | grep -v '/infrastructure/clock' \
            | grep -v '/infrastructure/idgen' \
            | grep -v '/inmemory' \
            | paste -sd ',' -)
          echo "Coverage measured on: $coverpkg"
          go test -tags=integration -race -coverprofile=coverage.out -covermode=atomic -coverpkg="$coverpkg" ./...
      - name: Enforce minimum coverage threshold
        run: |
          threshold=80.0
          coverage=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${coverage}%"
          echo "Minimum required: ${threshold}%"
          awk -v cov="$coverage" -v min="$threshold" 'BEGIN { if (cov + 0 < min + 0) { exit 1 } }' || {
            echo "::error::Coverage ${coverage}% is below the required ${threshold}% threshold."
            exit 1
          }
