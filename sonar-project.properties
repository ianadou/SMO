sonar.projectKey=ianadou_SMO
sonar.organization=ianadou

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go,frontend/tests/**/*,frontend/**/*.spec.ts,frontend/**/*.test.ts

sonar.exclusions=**/generated/**,**/*.gen.go,frontend/.nuxt/**,frontend/.output/**,frontend/dist/**,frontend/node_modules/**,SMO Design System/**,deploy/**
sonar.coverage.exclusions=**/*_test.go,frontend/tests/**/*,cmd/**,**/*.config.ts,frontend/vitest.config.ts,frontend/nuxt.config.ts

sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.scm.provider=git

# --- Accepted issues, each individually justified (honest, not cosmetic) ----
# C = generic rule inapplicable to this project's documented architecture.
# B = deliberate code decision, reviewed safe; suppressed at the source line.
sonar.issue.ignore.multicriteria=c7764,c8196,c4144,c3776,b1313,b6353,b6840,b6505

# C  typescript:S7764 "prefer globalThis over window": SMO is a browser-only
#    Nuxt SPA (ssr:false, see frontend/nuxt.config.ts). `window` is the
#    precise, idiomatic API here; `globalThis` is a cross-environment
#    abstraction with zero benefit and worse readability.
sonar.issue.ignore.multicriteria.c7764.ruleKey=typescript:S7764
sonar.issue.ignore.multicriteria.c7764.resourceKey=frontend/**/*

# C  godre:S8196 single-method interface naming: Clock / Event /
#    AssignmentStrategy are deliberately-named ports/markers mandated by
#    the hexagonal contract in CLAUDE.md, not accidental header interfaces.
sonar.issue.ignore.multicriteria.c8196.ruleKey=godre:S8196
sonar.issue.ignore.multicriteria.c8196.resourceKey=**/*.go

# C  go:S4144 identical implementations: in-memory fakes legitimately share
#    method bodies across tests. DAMP > DRY in test code (CLAUDE.md).
sonar.issue.ignore.multicriteria.c4144.ruleKey=go:S4144
sonar.issue.ignore.multicriteria.c4144.resourceKey=**/*_test.go

# C  go:S3776 cognitive complexity: idiomatic table-driven test whose
#    structure is intentionally flat and readable despite the metric.
sonar.issue.ignore.multicriteria.c3776.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.c3776.resourceKey=**/*_test.go

# B  go:S1313 hardcoded IP: documented trusted-proxy private CIDRs in the
#    composition root, reviewed safe (RFC1918, not user-controlled).
sonar.issue.ignore.multicriteria.b1313.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.b1313.resourceKey=cmd/server/main.go

# B  typescript:S6353 concise regex: [0-9] is kept for visual symmetry with
#    the adjacent [a-z]/[A-Z]/[^A-Za-z0-9] classes; \d is identical without
#    the unicode flag, so the change is pure churn that hurts readability.
sonar.issue.ignore.multicriteria.b6353.ruleKey=typescript:S6353
sonar.issue.ignore.multicriteria.b6353.resourceKey=frontend/app/utils/password.ts

# B  Web:S6840 autocomplete attribute: false positive. TextField is a Vue
#    component wrapping a native <input> that forwards a spec-valid token
#    (autocomplete="name"); Sonar parses the SFC template as raw HTML and
#    cannot traverse the component to see the real input.
sonar.issue.ignore.multicriteria.b6840.ruleKey=Web:S6840
sonar.issue.ignore.multicriteria.b6840.resourceKey=frontend/app/pages/register.vue

# B  githubactions:S6505 omitting --ignore-scripts: --ignore-scripts is
#    unusable here (it would skip the required `nuxt prepare` postinstall
#    and esbuild's native build). pnpm's explicit reviewed allowlist
#    pnpm.onlyBuiltDependencies = [@parcel/watcher, esbuild] is a tighter
#    control than the rule's blunt remedy. Reviewed safe.
sonar.issue.ignore.multicriteria.b6505.ruleKey=githubactions:S6505
sonar.issue.ignore.multicriteria.b6505.resourceKey=.github/workflows/ci.yml
