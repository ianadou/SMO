# Configuration for golangci-lint v2.x
# Strict config — we want to learn idiomatic Go from day one
# and catch problems before they reach PR review.
#
# To run locally:
#   golangci-lint run ./...
#
# To auto-fix what can be auto-fixed:
#   golangci-lint run --fix ./...

version: "2"

run:
  # Fail the build if the linter itself errors out.
  issues-exit-code: 1
  # Include test files in the analysis — bugs in tests are still bugs.
  tests: true
  # Require go.mod to be up-to-date; fail if a dependency is missing or unused.
  modules-download-mode: readonly

linters:
  # Start from an empty set and enable explicitly what we want.
  # Being explicit makes the config self-documenting and avoids surprises
  # when golangci-lint adds new linters in future versions.
  default: none

  enable:
    # --- Core correctness ---
    - errcheck        # catch unchecked errors — the #1 source of Go bugs
    - govet           # stdlib vet, catches suspicious constructs
    - ineffassign     # detects assignments whose value is never used
    - staticcheck     # the big one — replaces gosimple + stylecheck in v2
    - unused          # detects unused constants, vars, funcs, types

    # --- Error handling discipline ---
    - errorlint       # enforces proper error wrapping (Go 1.13+ style)
    - errname         # sentinel errors prefixed with Err, error types suffixed with Error
    - nilerr          # catches `return nil` when err is not nil
    - wrapcheck       # requires errors from external packages to be wrapped

    # --- HTTP & resource safety ---
    - bodyclose       # ensures HTTP response bodies are closed
    - contextcheck    # ensures functions use inherited contexts properly
    - rowserrcheck    # catches unchecked sql.Rows.Err()
    - sqlclosecheck   # ensures sql.Rows / sql.Stmt are closed

    # --- Go idioms & code quality ---
    - gocritic        # opinionated but valuable — catches many anti-patterns
    - gosec           # security-focused checks (hardcoded creds, weak crypto, etc.)
    - revive          # modern, configurable replacement for the old golint
    - unconvert       # detects unnecessary type conversions
    - unparam         # detects unused function parameters
    - misspell        # catches typos in comments and strings
    - prealloc        # suggests pre-allocating slices when the size is known
    - copyloopvar     # catches loop variable capture issues (Go 1.22+)

    # --- Complexity guards ---
    - cyclop          # cyclomatic complexity limit per function
    - funlen          # function length limit
    - nestif          # detects deeply nested if statements
    - gocognit        # cognitive complexity (more human than cyclomatic)

    # --- Style & hygiene ---
    - whitespace      # detects leading/trailing whitespace issues
    - dupword         # detects duplicate words in comments ("the the")
    - predeclared     # prevents shadowing of Go built-in identifiers
    - exhaustive      # checks enum switch statements are exhaustive

  settings:
    # Complexity thresholds — strict but reasonable for a small codebase.
    # We'll adjust these if we hit legitimate exceptions.
    cyclop:
      max-complexity: 12
      package-average: 8.0

    funlen:
      lines: 80
      statements: 50

    gocognit:
      min-complexity: 15

    nestif:
      min-complexity: 4

    # Revive config — activates the most valuable built-in rules.
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming

    # gosec — keep it strict but exclude rules that conflict with our stack.
    gosec:
      excludes:
        - G104  # duplicate with errcheck

    # wrapcheck — don't require wrapping for our own internal packages.
    wrapcheck:
      ignore-package-globs:
        - github.com/ianadou/smo/*

  exclusions:
    # Exclude autogenerated files and vendored code from all linters.
    generated: strict
    paths:
      - infrastructure/persistence/postgres/generated
      - vendor

    # Per-file exclusions — test files get some slack because test code
    # has legitimate reasons to break some rules (long table-driven tests,
    # repeated setup patterns, etc.).
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gocognit
          - cyclop
          - wrapcheck
          - gosec

# Formatters are a separate section in v2 — gofumpt was moved here.
formatters:
  enable:
    - gofumpt         # stricter formatter than gofmt, our chosen default
    - goimports       # auto-sorts and groups imports

  settings:
    gofumpt:
      extra-rules: true

    goimports:
      # Group imports: stdlib, third-party, then our own module
      local-prefixes:
        - github.com/ianadou/smo