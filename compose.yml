# -----------------------------------------------------------------------------
# SMO — Docker Compose stack for local development
#
# Services:
#   - postgres : PostgreSQL 16 database with a named volume for persistence
#   - redis    : Cache + rate-limit store
#   - app      : SMO HTTP backend, built from the root Dockerfile
#   - frontend : Nuxt 3 SPA, built from frontend/Dockerfile
#
# Usage:
#   cp .env.example .env          create your local .env file (REQUIRED)
#   docker compose up -d          start everything in the background
#   docker compose logs -f app    tail the app logs
#   docker compose down           stop and remove containers (keeps data)
#   docker compose down -v        stop and remove containers AND data volume
#
# IMPORTANT: POSTGRES_PASSWORD has no default value on purpose. Compose
# refuses to start if .env is missing or if POSTGRES_PASSWORD is not set,
# which forces every developer to make a conscious choice instead of
# relying on a hardcoded password baked into version control.
# -----------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    container_name: smo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required, see .env.example}
      POSTGRES_DB: ${POSTGRES_DB:-smo_dev}
    ports:
      # Expose on 5433 on the host to avoid colliding with a local Postgres
      # that might already be running on 5432.
      - "5433:5432"
    volumes:
      - smo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smo} -d ${POSTGRES_DB:-smo_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smo-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${PORT:-8081}
      # Inside the compose network, the postgres host is "postgres" (the
      # service name), not "localhost". The port is 5432 (container-internal),
      # not 5433 (which is the host-side port mapping).
      # POSTGRES_PASSWORD has no default here either; the guard in the
      # postgres service above ensures it is set before compose runs.
      DATABASE_URL: postgres://${POSTGRES_USER:-smo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smo_dev}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required, see .env.example}
      # REDIS_URL is optional. Empty/unset → cache disabled. Set with an
      # unreachable Redis → boot fails. See ADR 0002.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${PORT:-8081}:8081"

  redis:
    image: redis:7-alpine
    container_name: smo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smo-frontend
    restart: unless-stopped
    # The frontend has no runtime dependency on the backend at boot
    # — it talks to it via HTTP from the browser. We don't gate it on
    # `app` being healthy so a backend hiccup doesn't take the SPA
    # down with it.
    environment:
      # Nitro listens on this port; the EXPOSE in the Dockerfile
      # mirrors it. Override only if 3000 is taken on the host.
      PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  smo-postgres-data:
    name: smo-postgres-data
